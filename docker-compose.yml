name: duotalk

services:
  # Local MongoDB - Optional
  # Run with: docker compose --profile local up
  # Or skip this and use MongoDB Atlas
  mongodb:
    image: mongo:7
    restart: unless-stopped
    profiles:
      - local
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - duotalk-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-duotalk}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      # CORS origins: localhost for development, frontend service for Docker network
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://localhost:80,http://frontend:5173}
      SOCKET_IO_CORS_ORIGIN: ${SOCKET_IO_CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://localhost:80,http://frontend:5173}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_CLIENT_ID: ${FIREBASE_CLIENT_ID:-}
      FIREBASE_AUTH_URI: ${FIREBASE_AUTH_URI:-}
      FIREBASE_TOKEN_URI: ${FIREBASE_TOKEN_URI:-}
      FIREBASE_AUTH_PROVIDER_CERT_URL: ${FIREBASE_AUTH_PROVIDER_CERT_URL:-}
      FIREBASE_CLIENT_CERT_URL: ${FIREBASE_CLIENT_CERT_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - duotalk-network

  backend-init:
    image: alpine:latest
    profiles:
      - local
    depends_on:
      mongodb:
        condition: service_healthy
    command: echo "MongoDB is ready"
    networks:
      - duotalk-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SOCKET_URL: /socket.io
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_FACEBOOK_APP_ID: ${VITE_FACEBOOK_APP_ID}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - duotalk-network

  mongo-express:
    image: mongo-express:1.0.2
    restart: unless-stopped
    profiles:
      - local
      - admin
    environment:
      ME_CONFIG_MONGODB_URL:  mongodb+srv://dadwalshubham096:dadwalshubham096@cluster1.nd6wymu.mongodb.net/duotalk?retryWrites=true&w=majority&appName=Cluster1
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - duotalk-network

volumes:
  mongodb_data:

networks:
  duotalk-network:
    driver: bridge
